# vim:fileencoding=utf-8:foldmethod=marker

# Fonts {{{
font_family      SauceCodePro Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size        14.0

# }}}

# Cursor {{{

cursor_blink_interval 0

# }}}

# Tab bar {{{

tab_bar_edge top
tab_bar_style fade

# }}}

# Remote control {{{

allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

# }}}

# Shell integration {{{

shell_integration no-cursor

# }}}

# macOS {{{

macos_option_as_alt yes

# }}}

# Key mappings {{{

map kitty_mod+n launch --type=os-window --cwd=oldest
map kitty_mod+t launch --type=tab --cwd=oldest

# }}}


# BEGIN_KITTY_THEME
# Catppuccin-Mocha-Decaf
include catppuccin-mocha-decaf.conf
# END_KITTY_THEME

# Machine-specific overrides (last so they win)
include local.conf
