# vim:fileencoding=utf-8:foldmethod=marker

# Fonts {{{

font_size 15.0

# }}}

# Cursor {{{

cursor_blink_interval 0

# }}}

# Tab bar {{{

tab_bar_edge top
tab_bar_style fade

# }}}

# Remote control {{{

allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

# }}}

# Shell integration {{{

shell_integration no-cursor

# }}}

# Key mappings {{{

map kitty_mod+n launch --type=os-window --cwd=oldest
map kitty_mod+t launch --type=tab --cwd=oldest

# Send literal newline in Claude windows
map --when-focus-on title:claude shift+enter send_text normal,application \\\n

# }}}

# BEGIN_KITTY_FONTS
font_family      family="SauceCodePro Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# BEGIN_KITTY_THEME
# Catppuccin-Mocha-Decaf
include catppuccin-mocha-decaf.conf
# END_KITTY_THEME
